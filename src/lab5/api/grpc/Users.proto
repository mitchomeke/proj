syntax = "proto3";

option java_package = "lab5.server.grpc.generated_java";
option java_outer_classname = "UsersProtoBuf";

service GrpcUsers {
	rpc PostUser(GrpcUser) returns (PostUserResult);
	rpc GetUser(GetUserArgs) returns (GetUserResult);
	rpc UpdateUser(UpdateUserArgs) returns (UpdateUserResult);
	rpc DeleteUser(DeleteUserArgs) returns (DeleteUserResult);
	rpc SearchUsers(SearchUsersArgs) returns (stream GrpcUser);
	rpc GetUserPhoto(GetUserPhotoArgs) returns (GetUserPhotoResult);
	rpc UpdateUserPhoto(UpdateUserPhotoArgs) returns (UpdateUserPhotoResult);
}

message GrpcUser {
	string name = 1;
	optional string pwd = 2;
	optional string displayName = 3;
	optional string domain = 4;
	optional bytes photo = 5;
	repeated string phoneNumbers = 6;
}

message PostUserResult {
	string userAddress = 1;
}

message GetUserArgs {
	string name = 1;
	string pwd = 2;
}

message GetUserResult {
	GrpcUser user = 1;
}

message UpdateUserArgs {
	string name = 1;
	string pwd = 2;
	GrpcUser info = 3;
}

message UpdateUserResult {
	GrpcUser user = 1;
}

message DeleteUserArgs {
	string name = 1;
	string pwd = 2;
}

message DeleteUserResult {
	GrpcUser user = 1;
}

message SearchUsersArgs {
	string name = 1;
	string pwd = 2;
	string query = 3;
}

message GetUserPhotoArgs {
	string name = 1;
	string pwd = 2;
}

message GetUserPhotoResult {
	bytes photo = 1;
}

message UpdateUserPhotoArgs {
	string name = 1;
	string pwd = 2;
	bytes photo = 3;
}

message UpdateUserPhotoResult {
	GrpcUser user = 1;
}

